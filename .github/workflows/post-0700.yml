name: 朝投稿 (7:00 JST)

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
        working-directory: auto-post
      - run: node post-once.js
        working-directory: auto-post
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          POST_SLOT: '0'
