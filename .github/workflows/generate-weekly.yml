name: 週次投稿ファイル自動生成

on:
  # 毎週日曜 22:00 JST (13:00 UTC) に実行
  schedule:
    - cron: '0 13 * * 0'
  # 手動実行も可能（current_week=true で今週分を生成）
  workflow_dispatch:
    inputs:
      current_week:
        description: '今週分を生成する（テスト用）'
        required: false
        default: 'false'
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 依存パッケージをインストール
        run: npm install
        working-directory: auto-post

      - name: 週次投稿ファイルを生成
        env:
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GENERATE_CURRENT_WEEK: ${{ github.event.inputs.current_week || 'false' }}
        run: node generate-weekly.js
        working-directory: auto-post
